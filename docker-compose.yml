version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: golden_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: test_golden
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./Backend/test_golden_owl
      dockerfile: Dockerfile
    container_name: golden_backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "${PORT}:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: test_golden
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}

  frontend:
    build:
      context: .
      dockerfile: ./Frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: golden_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data: